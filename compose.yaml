services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: henry
      POSTGRES_PASSWORD: henry
      POSTGRES_DB: henry
    ports:
      - "5432:5432"
    volumes:
      - henrydb:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U henry"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  henrydb: {}
